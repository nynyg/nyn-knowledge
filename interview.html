<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Interview Prep · nyn-knowledge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fb; color: #1f2937; min-height: 100vh; }
    header { background: #ffffffcc; backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; gap: 16px; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #111827; }
    header span { font-size: 0.9rem; color: #6b7280; }
    header a { font-size: 0.95rem; color: #2563eb; text-decoration: none; }
    .search { padding: 20px 40px 0; }
    .search input { width: 100%; max-width: 640px; padding: 12px 16px; background: #fff; border: 1px solid #d1d5db; border-radius: 12px; color: #111827; font-size: 0.95rem; outline: none; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
    .search input:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }
    .callout { margin: 18px 40px 0; padding: 14px 16px; border: 1px solid #fde68a; background: #fffbeb; color: #92400e; border-radius: 12px; font-size: 0.92rem; line-height: 1.55; }
    .toolbar { padding: 20px 40px 8px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .toolbar-label { font-size: 0.86rem; color: #6b7280; font-weight: 600; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; }
    .tag { padding: 6px 12px; border-radius: 999px; font-size: 0.82rem; cursor: pointer; border: 1px solid #d1d5db; background: #fff; color: #4b5563; transition: all 0.18s; }
    .tag:hover, .tag.active { background: #fff7ed; border-color: #fb923c; color: #c2410c; }
    .count { padding: 0 40px 14px; font-size: 0.92rem; color: #6b7280; }
    .grid { padding: 0 40px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 20px; transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
    .card:hover { border-color: #fdba74; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .venue { font-size: 0.75rem; background: #fff7ed; color: #c2410c; padding: 3px 8px; border-radius: 999px; white-space: nowrap; border: 1px solid #fed7aa; }
    .card h3 { font-size: 1rem; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
    .card h3 a { color: #111827; text-decoration: none; }
    .card h3 a:hover { color: #c2410c; }
    .authors { font-size: 0.84rem; color: #6b7280; margin-bottom: 8px; }
    .tldr { font-size: 0.9rem; color: #374151; line-height: 1.58; margin-bottom: 12px; }
    .figure-wrap { margin: 10px 0 14px; }
    .figure-link { display: block; border: 1px solid #e5e7eb; border-radius: 14px; overflow: hidden; background: #f9fafb; }
    .figure-link:hover { border-color: #fdba74; }
    .figure-link img { display: block; width: 100%; height: auto; }
    .figure-caption { padding: 10px 12px; font-size: 0.8rem; color: #6b7280; background: #fff; border-top: 1px solid #e5e7eb; }
    .qa { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f3f4f6; display: grid; gap: 10px; }
    .qa-block { font-size: 0.84rem; line-height: 1.58; color: #374151; }
    .qa-block strong { display: inline-block; margin-bottom: 4px; color: #111827; }
    .card-footer { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-top: 14px; }
    .citations { font-size: 0.8rem; color: #6b7280; min-width: 72px; }
    .meta { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .badge { font-size: 0.72rem; padding: 3px 8px; border-radius: 999px; border: 1px solid #e5e7eb; background: #f9fafb; color: #4b5563; }
    .priority-must { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .priority-important { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .priority-optional { background: #f9fafb; color: #6b7280; border-color: #e5e7eb; }
    @media (max-width: 700px) {
      header { padding: 16px; flex-direction: column; align-items: flex-start; }
      .search, .toolbar, .count { padding-left: 16px; padding-right: 16px; }
      .callout { margin-left: 16px; margin-right: 16px; }
      .grid { grid-template-columns: 1fr; padding: 0 16px 24px; }
      .card { padding: 16px; }
      .card-footer { flex-direction: column; }
      .meta { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🎯 Apple Interview Prep</h1>
      <span>Cleaner tags, lighter theme, same reading list.</span>
    </div>
    <div style="display:flex; gap:14px; flex-wrap:wrap;">

  </header>

  <div class="search">
    <input type="text" id="searchInput" placeholder="Search by topic, title, question, or answer angle..." oninput="filterPapers()">
  </div>

  <div class="callout">
    This page is built from the Apple interviewer’s reading list. Top filters are now just <strong>topics</strong>. Each card separately shows its <strong>type</strong> and <strong>priority</strong> so the page stays readable.
  </div>

    <div class="filters" id="filterTags"></div>

  <div class="count" id="countLabel"></div>

    const topics = ["All", ...new Set(papers.map(p => p.topic))];
    let activeTopic = "All";

    function renderTags() {
      const el = document.getElementById('filterTags');
      el.innerHTML = topics.map(t =>
        `<span class="tag ${activeTopic===t?'active':''}" onclick="toggleTag('${t.replace(/'/g, "\\'")}')">${t}</span>`
      ).join('');
    }

    function toggleTag(tag) {
      activeTopic = tag;
      renderTags();
      filterPapers();
    }

    function getLink(p) {
      if (p.arxiv) return `https://arxiv.org/abs/${p.arxiv}`;
      return p.url || '#';
    }

    function priorityClass(priority) {
      if (priority === 'Must Read') return 'priority-must';
      if (priority === 'Important') return 'priority-important';
      return 'priority-optional';
    }

    function filterPapers() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = papers.filter(p => {
        const matchTopic = activeTopic === 'All' || p.topic === activeTopic;
        const matchSearch = !q ||
          p.title.toLowerCase().includes(q) ||
          p.topic.toLowerCase().includes(q) ||
          p.type.toLowerCase().includes(q) ||
          p.priority.toLowerCase().includes(q) ||
          p.tldr.toLowerCase().includes(q) ||
          p.venue.toLowerCase().includes(q) ||
          p.questions.join(' ').toLowerCase().includes(q) ||
          p.answer.toLowerCase().includes(q) ||
          p.appleWhy.toLowerCase().includes(q);
        return matchTopic && matchSearch;
      });
      renderPapers(filtered);
    }

    function renderPapers(list) {
      document.getElementById('countLabel').textContent = `${list.length} item${list.length!==1?'s':''}`;
      document.getElementById('paperGrid').innerHTML = list.map(p => `
        <div class="card">
          <div class="card-header">
            <span class="venue">${p.venue}</span>
          </div>
          <h3><a href="${getLink(p)}" target="_blank">${p.title}</a></h3>
          <div class="authors">${p.authors}</div>
          ${p.figure ? `<div class="figure-wrap"><a class="figure-link" href="${p.figure}" target="_blank"><img src="${p.figure}" alt="Key figure for ${p.title}"><div class="figure-caption">${p.figureCaption || 'Key figure'}</div></a></div>` : ''}
          <div class="tldr">${p.tldr}</div>
          <div class="qa">
            <div class="qa-block"><strong>Possible questions</strong><br>${p.questions.join('<br>')}</div>
            <div class="qa-block"><strong>How to answer</strong><br>${p.answer}</div>
            <div class="qa-block"><strong>Why Apple may care</strong><br>${p.appleWhy}</div>
          </div>
          <div class="card-footer">
            <span class="citations">${p.citations ? `📊 ${p.citations.toLocaleString()} citations` : ''}</span>
            <div class="meta">
              <span class="badge">${p.topic}</span>
              <span class="badge">${p.type}</span>
              <span class="badge ${priorityClass(p.priority)}">${p.priority}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    renderTags();
    filterPapers();
  </script>
</body>
</html>
