<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#111827">LoRA key idea</text>
  <text x="60" y="110" font-size="20" font-family="Arial, sans-serif" fill="#6b7280">Freeze big pretrained weight W. Learn tiny low-rank update ΔW = B·A.</text>
  <rect x="80" y="180" width="320" height="220" rx="18" fill="#e0e7ff" stroke="#6366f1" stroke-width="3"/>
  <text x="210" y="250" text-anchor="middle" font-size="42" font-family="Arial" font-weight="700" fill="#312e81">W</text>
  <text x="210" y="295" text-anchor="middle" font-size="22" font-family="Arial" fill="#4338ca">frozen pretrained weight</text>
  <rect x="495" y="205" width="110" height="165" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="550" y="285" text-anchor="middle" font-size="38" font-family="Arial" font-weight="700" fill="#92400e">B</text>
  <text x="550" y="325" text-anchor="middle" font-size="18" font-family="Arial" fill="#92400e">d × r</text>
  <rect x="655" y="205" width="110" height="165" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="710" y="285" text-anchor="middle" font-size="38" font-family="Arial" font-weight="700" fill="#92400e">A</text>
  <text x="710" y="325" text-anchor="middle" font-size="18" font-family="Arial" fill="#92400e">r × k</text>
  <text x="630" y="285" text-anchor="middle" font-size="36" font-family="Arial" fill="#6b7280">·</text>
  <rect x="855" y="180" width="260" height="220" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="985" y="255" text-anchor="middle" font-size="34" font-family="Arial" font-weight="700" fill="#166534">W + ΔW</text>
  <text x="985" y="300" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">same shape as W</text>
  <text x="985" y="338" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">but train only A, B</text>
  <path d="M400 290 H470" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M770 290 H830" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="438" y="270" font-size="22" font-family="Arial" fill="#475569">+</text>
  <rect x="80" y="470" width="1040" height="150" rx="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="115" y="525" font-size="24" font-family="Arial" font-weight="700" fill="#111827">Interview takeaway</text>
  <text x="115" y="565" font-size="22" font-family="Arial" fill="#374151">LoRA saves training memory because optimizer state and gradients are kept only for tiny low-rank matrices,</text>
  <text x="115" y="600" font-size="22" font-family="Arial" fill="#374151">not for the full model weights. You trade a small-rank bottleneck for huge efficiency gains.</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
</svg>