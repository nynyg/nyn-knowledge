<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#111827">DoRA intuition</text>
  <text x="60" y="110" font-size="20" font-family="Arial" fill="#6b7280">Decompose a weight into magnitude and direction, then adapt direction more effectively than vanilla LoRA.</text>
  <circle cx="260" cy="330" r="120" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
  <line x1="260" y1="330" x2="340" y2="240" stroke="#2563eb" stroke-width="8"/>
  <text x="180" y="500" font-size="24" font-family="Arial" fill="#1d4ed8">direction</text>
  <text x="150" y="535" font-size="22" font-family="Arial" fill="#6b7280">where the weight points</text>
  <text x="140" y="575" font-size="22" font-family="Arial" fill="#6b7280">+ magnitude (how long)</text>
  <path d="M430 330 H550" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="590" y="210" width="230" height="240" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="705" y="260" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#111827">LoRA mostly</text>
  <text x="705" y="305" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#111827">updates direction</text>
  <text x="705" y="355" text-anchor="middle" font-size="22" font-family="Arial" fill="#6b7280">more expressive than</text>
  <text x="705" y="388" text-anchor="middle" font-size="22" font-family="Arial" fill="#6b7280">treating weight as one block</text>
  <path d="M830 330 H950" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="970" y="210" width="160" height="240" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="1050" y="295" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#166534">more stable</text>
  <text x="1050" y="335" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">adaptation</text>
  <rect x="80" y="600" width="1050" height="55" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="110" y="635" font-size="22" font-family="Arial" fill="#7c2d12">Interview takeaway: DoRA asks whether separating “where the vector points” from “how strong it is” gives a better low-rank update space.</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
</svg>