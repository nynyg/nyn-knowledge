<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#111827">llama.cpp intuition</text>
  <text x="60" y="110" font-size="20" font-family="Arial" fill="#6b7280">A lightweight runtime that makes quantized local inference practical on CPUs and Apple Silicon.</text>
  <rect x="80" y="190" width="250" height="280" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="205" y="245" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#1d4ed8">Quantized model</text>
  <text x="205" y="305" text-anchor="middle" font-size="24" font-family="Arial" fill="#1e3a8a">GGUF / low-bit</text>
  <path d="M340 330 H460" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="500" y="190" width="250" height="280" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="625" y="245" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#111827">llama.cpp runtime</text>
  <text x="625" y="305" text-anchor="middle" font-size="24" font-family="Arial" fill="#374151">efficient kernels</text>
  <text x="625" y="340" text-anchor="middle" font-size="24" font-family="Arial" fill="#374151">minimal dependencies</text>
  <path d="M760 330 H880" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="920" y="190" width="220" height="280" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="1030" y="260" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#166534">Local inference</text>
  <text x="1030" y="310" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">CPU</text>
  <text x="1030" y="345" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">Apple Silicon</text>
  <text x="1030" y="380" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">small GPUs</text>
  <rect x="80" y="530" width="1060" height="95" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="110" y="588" font-size="22" font-family="Arial" fill="#7c2d12">Interview takeaway: llama.cpp matters because it turns quantized model formats into something you can actually run locally, especially on Apple hardware.</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
