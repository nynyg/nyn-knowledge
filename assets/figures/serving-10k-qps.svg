<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#111827">LLM serving system for 10k QPS</text>
  <text x="60" y="110" font-size="20" font-family="Arial" fill="#6b7280">Whiteboard answer: define workload, separate prefill/decode, schedule aggressively, manage KV cache, optimize runtime.</text>

  <rect x="70" y="180" width="180" height="90" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="160" y="220" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#1d4ed8">API / Router</text>
  <text x="160" y="252" text-anchor="middle" font-size="18" font-family="Arial" fill="#1e3a8a">auth, routing, request class</text>

  <rect x="320" y="180" width="220" height="90" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="430" y="220" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#c2410c">Scheduler</text>
  <text x="430" y="252" text-anchor="middle" font-size="18" font-family="Arial" fill="#9a3412">continuous batching</text>

  <rect x="630" y="120" width="240" height="110" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="750" y="165" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#111827">Prefill path</text>
  <text x="750" y="198" text-anchor="middle" font-size="18" font-family="Arial" fill="#374151">compute-heavy</text>
  <text x="750" y="224" text-anchor="middle" font-size="18" font-family="Arial" fill="#374151">prompt ingestion</text>

  <rect x="630" y="285" width="240" height="110" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="750" y="330" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#111827">Decode path</text>
  <text x="750" y="363" text-anchor="middle" font-size="18" font-family="Arial" fill="#374151">memory / bandwidth bound</text>
  <text x="750" y="389" text-anchor="middle" font-size="18" font-family="Arial" fill="#374151">token streaming loop</text>

  <rect x="970" y="180" width="260" height="90" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="1100" y="220" text-anchor="middle" font-size="24" font-family="Arial" font-weight="700" fill="#166534">KV Cache Manager</text>
  <text x="1100" y="252" text-anchor="middle" font-size="18" font-family="Arial" fill="#166534">paging, reuse, eviction</text>

  <rect x="320" y="510" width="300" height="150" rx="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="470" y="555" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#111827">Latency vs Throughput</text>
  <text x="350" y="600" font-size="20" font-family="Arial" fill="#374151">• Bigger batches → better throughput</text>
  <text x="350" y="635" font-size="20" font-family="Arial" fill="#374151">• More queueing → worse tail latency</text>

  <rect x="700" y="510" width="300" height="150" rx="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="850" y="555" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#111827">Runtime layer</text>
  <text x="730" y="600" font-size="20" font-family="Arial" fill="#374151">• quantization</text>
  <text x="730" y="635" font-size="20" font-family="Arial" fill="#374151">• optimized kernels</text>
  <text x="730" y="670" font-size="20" font-family="Arial" fill="#374151">• autoscaling / observability</text>

  <rect x="1040" y="510" width="250" height="150" rx="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="1165" y="555" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#111827">Isolation</text>
  <text x="1070" y="600" font-size="20" font-family="Arial" fill="#374151">• short vs long context</text>
  <text x="1070" y="635" font-size="20" font-family="Arial" fill="#374151">• priority classes</text>

  <path d="M250 225 H310" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M540 225 H620" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M540 240 C590 240,590 340,620 340" stroke="#64748b" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M870 225 H960" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M870 340 C930 340,930 250,960 250" stroke="#64748b" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <rect x="70" y="740" width="1260" height="95" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="100" y="790" font-size="24" font-family="Arial" font-weight="700" fill="#7c2d12">Interview takeaway</text>
  <text x="320" y="790" font-size="22" font-family="Arial" fill="#7c2d12">A strong answer starts with workload definition, then separates prefill from decode, and treats scheduler + KV cache as first-class systems components.</text>
</svg>