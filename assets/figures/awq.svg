<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#111827">AWQ intuition</text>
  <text x="60" y="110" font-size="20" font-family="Arial" fill="#6b7280">Use activation information to protect the most important channels during weight quantization.</text>
  <rect x="80" y="180" width="310" height="280" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="110" y="225" font-size="26" font-family="Arial" font-weight="700" fill="#111827">Observed activations</text>
  <rect x="120" y="270" width="44" height="120" rx="8" fill="#fde68a"/><rect x="180" y="240" width="44" height="150" rx="8" fill="#f59e0b"/><rect x="240" y="290" width="44" height="100" rx="8" fill="#fde68a"/><rect x="300" y="210" width="44" height="180" rx="8" fill="#ea580c"/>
  <text x="110" y="430" font-size="22" font-family="Arial" fill="#374151">Large activation channels matter more.</text>
  <path d="M400 320 H520" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="540" y="180" width="260" height="280" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="570" y="225" font-size="26" font-family="Arial" font-weight="700" fill="#111827">Protect salient channels</text>
  <rect x="590" y="270" width="46" height="130" rx="8" fill="#22c55e"/><rect x="650" y="240" width="46" height="160" rx="8" fill="#16a34a"/><rect x="710" y="290" width="46" height="110" rx="8" fill="#94a3b8"/>
  <text x="570" y="430" font-size="22" font-family="Arial" fill="#374151">Do not quantize every channel equally aggressively.</text>
  <path d="M810 320 H930" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="950" y="180" width="180" height="280" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="1040" y="255" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#166534">Better</text>
  <text x="1040" y="295" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#166534">accuracy</text>
  <text x="1040" y="335" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">at same bit budget</text>
  <rect x="80" y="530" width="1050" height="95" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="110" y="588" font-size="22" font-family="Arial" fill="#7c2d12">Interview takeaway: AWQ says channel importance should come from real activation behavior, not from treating all weights uniformly.</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
</svg>