<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#111827">Quantization intuition</text>
  <text x="60" y="110" font-size="20" font-family="Arial" fill="#6b7280">Map many float values into fewer discrete levels to save memory and improve throughput.</text>
  <rect x="80" y="180" width="460" height="300" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="110" y="225" font-size="26" font-family="Arial" font-weight="700" fill="#111827">FP weights</text>
  <path d="M120 420 C180 240, 280 500, 350 260 S470 360, 500 230" stroke="#2563eb" stroke-width="8" fill="none"/>
  <text x="110" y="455" font-size="22" font-family="Arial" fill="#374151">Continuous range of real-valued weights</text>
  <rect x="660" y="180" width="460" height="300" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="690" y="225" font-size="26" font-family="Arial" font-weight="700" fill="#111827">INT weights</text>
  <line x1="730" y1="250" x2="730" y2="430" stroke="#f59e0b" stroke-width="8"/>
  <line x1="810" y1="250" x2="810" y2="430" stroke="#f59e0b" stroke-width="8"/>
  <line x1="890" y1="250" x2="890" y2="430" stroke="#f59e0b" stroke-width="8"/>
  <line x1="970" y1="250" x2="970" y2="430" stroke="#f59e0b" stroke-width="8"/>
  <line x1="1050" y1="250" x2="1050" y2="430" stroke="#f59e0b" stroke-width="8"/>
  <text x="690" y="455" font-size="22" font-family="Arial" fill="#374151">Fewer discrete buckets → smaller storage, some rounding error</text>
  <path d="M550 330 H640" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="80" y="530" width="1040" height="110" rx="18" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
  <text x="110" y="575" font-size="24" font-family="Arial" font-weight="700" fill="#155e75">Interview takeaway</text>
  <text x="320" y="575" font-size="22" font-family="Arial" fill="#164e63">PTQ = quantize after training. QAT = simulate quantization during training. Per-channel usually preserves accuracy better than per-tensor.</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
</svg>