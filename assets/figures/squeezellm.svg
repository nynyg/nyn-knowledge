<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-size="34" font-family="Arial" font-weight="700" fill="#111827">SqueezeLLM intuition</text>
  <text x="60" y="110" font-size="20" font-family="Arial" fill="#6b7280">Split weights into a dense low-bit part plus a sparse high-precision correction.</text>
  <rect x="90" y="190" width="250" height="260" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="215" y="245" text-anchor="middle" font-size="32" font-family="Arial" font-weight="700" fill="#111827">Original W</text>
  <rect x="430" y="190" width="280" height="260" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="570" y="235" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#1d4ed8">Dense low-bit part</text>
  <g fill="#60a5fa">
    <rect x="470" y="270" width="28" height="28" rx="4"/><rect x="510" y="270" width="28" height="28" rx="4"/><rect x="550" y="270" width="28" height="28" rx="4"/><rect x="590" y="270" width="28" height="28" rx="4"/><rect x="630" y="270" width="28" height="28" rx="4"/>
    <rect x="470" y="310" width="28" height="28" rx="4"/><rect x="510" y="310" width="28" height="28" rx="4"/><rect x="550" y="310" width="28" height="28" rx="4"/><rect x="590" y="310" width="28" height="28" rx="4"/><rect x="630" y="310" width="28" height="28" rx="4"/>
  </g>
  <rect x="800" y="190" width="300" height="260" rx="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="950" y="235" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#b91c1c">Sparse high-precision fix</text>
  <g fill="#ef4444">
    <rect x="860" y="280" width="28" height="28" rx="4"/><rect x="980" y="320" width="28" height="28" rx="4"/><rect x="1040" y="280" width="28" height="28" rx="4"/>
  </g>
  <text x="850" y="390" font-size="22" font-family="Arial" fill="#7f1d1d">Keep only the most error-sensitive entries.</text>
  <path d="M350 320 H410" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="745" y="325" font-size="34" font-family="Arial" fill="#64748b">+</text>
  <rect x="90" y="530" width="1010" height="95" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="120" y="588" font-size="22" font-family="Arial" fill="#7c2d12">Interview takeaway: not all weights should pay the same quantization penalty — preserve a tiny set of fragile weights in high precision.</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
</svg>